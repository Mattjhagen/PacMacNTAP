# PacMac Mobile - Production Nginx Configuration
# Mapped for: pacmacmobile.com & www.pacmacmobile.com

# 1. Redirect HTTP www.pacmacmobile.com to HTTPS non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.pacmacmobile.com;
    return 301 https://pacmacmobile.com$request_uri;
}

# 2. Redirect HTTP pacmacmobile.com to HTTPS non-www
server {
    listen 80;
    listen [::]:80;
    server_name pacmacmobile.com;
    return 301 https://pacmacmobile.com$request_uri;
}

# 3. Redirect HTTPS www.pacmacmobile.com to HTTPS non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pacmacmobile.com;

    # SSL certificates managed by Certbot Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/pacmacmobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pacmacmobile.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://pacmacmobile.com$request_uri;
}

# 4. Main Production Server Block (HTTPS pacmacmobile.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pacmacmobile.com;

    # SSL certificates managed by Certbot Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/pacmacmobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pacmacmobile.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Content Security Policy (Optimized for Supabase and Google Fonts)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://api.resend.com;" always;

    # Serve static assets and proxy API endpoints to Node Express
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip Compression Optimization
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript;

    # Production Asset Cache Curing (Static Files)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|ico|gif|jpe?g|png|svg|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
